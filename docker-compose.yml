services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: elearn
      POSTGRES_USER: elearn
      POSTGRES_PASSWORD: elearn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearn"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: sh wait-for-db.sh python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: elearn
      DB_USER: elearn
      DB_PASSWORD: elearn
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-django-insecure-local-dev-only-change-me}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      RUN_CODE_ENABLED: "${RUN_CODE_ENABLED:-1}"
      RUN_CODE_TIMEOUT_SECONDS: "${RUN_CODE_TIMEOUT_SECONDS:-3}"
      RUN_CODE_MAX_CHARS: "${RUN_CODE_MAX_CHARS:-8000}"
      RUN_CODE_MAX_OUTPUT_CHARS: "${RUN_CODE_MAX_OUTPUT_CHARS:-12000}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"

volumes:
  postgres_data:
